name: daily
on:
  schedule:
    - cron: "30 22 * * 1-5"   # ~30 min after US market close, weekdays (UTC)
  workflow_dispatch:
    inputs:
      force_rebalance:
        description: "Force a monthly rebalance"
        default: "false"
permissions:
  contents: write
concurrency:
  group: daily
  cancel-in-progress: false
jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Smoke tests before publishing
        run: pytest tests/test_io_utils.py tests/test_engine.py tests/test_metrics.py -q
      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: data/prices.parquet
          key: prices-${{ github.run_id }}
          restore-keys: |
            prices-
      - name: Run daily pipeline
        run: |
          if [ "${{ github.event.inputs.force_rebalance }}" = "true" ]; then
            python scripts/run_daily.py --force-rebalance
          else
            python scripts/run_daily.py
          fi
      - name: Commit updated data
        run: |
          git config user.name "Roman Nguyen"
          git config user.email "romanvnguyen0411@gmail.com"
          git add data models mlruns
          git diff --cached --quiet || git commit -m "data: daily update $(date -u +%F)"
          git push
